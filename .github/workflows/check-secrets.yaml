---
name: Prevent secrets leak

on: [pull_request]

jobs:
  check-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get changed YAML
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e
        with:
          patterns: |
            **/*.yml
            **/*.yaml

      - name: Check that all secrets encrypted with SOPS
        if: ${{ steps.changed-files.outputs.changed_files }}
        run: |
          failed=false
          files=$(echo '${{ steps.changed-files.outputs.changed_files }}' | tr -d '[]"' | tr ',' '\n')
          for file in $files; do
              [ -f "$file" ] || continue
              echo "Checking $file..."
              if grep -q "^kind: Secret" "$file"; then
                  if ! grep -q "^sops:" "$file"; then
                      echo "❌ ERROR: $file contains Secret but is NOT encrypted с SOPS"
                      failed=true
                  else
                      echo "✅ $file is properly encrypted with SOPS"
                  fi
              else
                  echo "  Skipping (no Secret)"
              fi
          done
          if [ "$failed" = "true" ]; then
              echo ""
              echo "Some Secret manifests are not encrypted with SOPS. Please encrypt them before merging."
              exit 1
          fi
